<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio Cleanup Controls Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #16211f;
        --muted: #5e6b67;
        --line: #d9e0dd;
        --panel: #f7faf8;
        --accent: #136f63;
        --warn: #a15c00;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1, h2, p { margin-top: 0; }

      h1 {
        font-size: 32px;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .lede {
        color: var(--muted);
        max-width: 720px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }

      .controls {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }

      .control {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
      }

      .control strong { display: block; margin-bottom: 3px; }
      .control span { color: var(--muted); font-size: 13px; }

      .speakers {
        display: grid;
        gap: 10px;
      }

      .cleanup-rollup {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 14px;
        margin-bottom: 16px;
        display: grid;
        gap: 10px;
      }

      .cleanup-rollup.all-clear {
        border-color: #b8ddd4;
        background: #f3fbf8;
      }

      .rollup-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .rollup-status {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        border-radius: 999px;
        padding: 0 12px;
        font-weight: 800;
        font-size: 13px;
      }

      .rollup-status.all-clear { color: #075246; background: #dff5ef; }
      .rollup-status.attention { color: #7a4400; background: #fff1d6; }

      .rollup-detail {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .rollup-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .rollup-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .rollup-speaker-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .rollup-speaker-tags .rollup-speaker-tag {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        border-radius: 999px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
        color: #7a4400;
        background: #fff1d6;
      }

      .rollup-choice-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .rollup-choice-tags .rollup-choice-tag {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        border-radius: 999px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
        color: #075246;
        background: #dff5ef;
      }

      .rollup-moment-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .rollup-moment-tags .rollup-moment-tag {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        border-radius: 999px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
        color: #3f4d66;
        background: #e8edf5;
      }

      .rollup-effect-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .rollup-effect-tags .rollup-effect-tag {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        border-radius: 999px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
        color: #5e6b67;
        background: #eef2f0;
      }

      .speaker.filtered-out {
        display: none;
      }

      .speaker.jump-highlight {
        box-shadow: 0 0 0 2px #136f63;
      }

      .speaker {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      select {
        min-height: 38px;
        border: 1px solid #bfcbc7;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        padding: 8px 10px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 0 11px;
        font-weight: 700;
        font-size: 13px;
      }

      .badge.suggested { color: #7a4400; background: #fff1d6; }
      .badge.applied { color: #075246; background: #dff5ef; }
      .badge.original { color: #3f4d66; background: #e8edf5; }
      .badge.not-needed { color: #5e6b67; background: #eef2f0; }

      .moments {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      .compare {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 18px;
      }

      .preview-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
      }

      .preview-card strong {
        display: block;
        font-size: 13px;
        margin-bottom: 8px;
      }

      .preview-card .preview-note {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 8px;
      }

      .wave {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 52px;
        padding: 8px;
        border-radius: 6px;
        background: #eef2f0;
      }

      .wave i {
        flex: 1;
        min-width: 4px;
        border-radius: 2px;
        background: #8aa59c;
      }

      .wave.cleaned i {
        background: #2a8476;
      }

      .wave.cleaned i.soft {
        background: #6db5a8;
      }

      .effect-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .effect-tags .effect-tag {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 9px;
        font-size: 11px;
        font-weight: 700;
        color: #075246;
        background: #dff5ef;
      }

      @media (max-width: 640px) {
        .compare { grid-template-columns: 1fr; }
      }

      button {
        min-height: 38px;
        border: 1px solid #b9c8c3;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        padding: 7px 11px;
        cursor: pointer;
      }

      button[aria-pressed="true"] {
        border-color: var(--accent);
        background: #e0f3ee;
        color: var(--accent);
      }

      button.suggested-moment {
        border-style: dashed;
        border-color: var(--accent);
      }

      .moment-hint {
        color: var(--muted);
        font-size: 12px;
        margin: -8px 0 16px;
      }

      .preview-now {
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
        margin: -6px 0 10px;
      }

      .preview-tradeoff {
        color: var(--muted);
        font-size: 12px;
        margin: -8px 0 10px;
      }

      button.primary {
        border-color: #0f5d53;
        background: var(--accent);
        color: #ffffff;
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        border-radius: 999px;
        padding: 0 12px;
        font-weight: 800;
        color: #075246;
        background: #dff5ef;
      }

      .note {
        color: var(--muted);
        font-size: 13px;
        margin-top: 14px;
      }

      .speaker-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button.secondary {
        min-height: 38px;
        border: 1px solid #b9c8c3;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        padding: 7px 11px;
        cursor: pointer;
      }

      @media (max-width: 840px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Audio cleanup controls</h1>
      <p class="lede">Improve episode sound with plain-language quality choices — not decibel sliders. Preview cleanup on real conversation moments before applying it across the episode.</p>

      <section class="grid" aria-label="Audio cleanup workspace">
        <div class="panel">
          <h2>Quality choices</h2>
          <div class="controls" id="controls"></div>

          <h2>Preview moment</h2>
          <div class="moments" id="moments" role="group" aria-label="Preview moment"></div>
          <p class="preview-now" id="preview-now" aria-live="polite"></p>
          <p class="preview-tradeoff" id="preview-tradeoff" aria-live="polite"></p>
          <p class="moment-hint" id="moment-hint" aria-live="polite"></p>

          <h2>Compare on this moment</h2>
          <div class="compare" id="compare" aria-live="polite"></div>

          <h2>Speaker balance</h2>
          <div class="cleanup-rollup" id="cleanupRollup" aria-live="polite"></div>
          <div class="speakers" id="speakers"></div>
        </div>

        <aside class="panel" aria-live="polite">
          <h2>Cleanup summary</h2>
          <div id="status" class="status">Sounds ready</div>
          <p class="note" id="summary"></p>
          <button type="button" class="primary" id="apply" style="margin-top: 14px;">Apply to episode</button>
        </aside>
      </section>
    </main>

    <script>
      const choices = [
        { id: "noise", label: "Reduce background noise", hint: "Softens room hum without dulling voices", effect: "Room hum softens; voices stay present", bestMoment: "noisy-room" },
        { id: "balance", label: "Balance loudness between speakers", hint: "Keeps host and guest at a natural level", effect: "Host and guest levels move closer together", bestMoment: "exchange" },
        { id: "quiet", label: "Enhance a quiet speaker", hint: "Lifts a soft guest without raising room noise", effect: "Soft guest lines rise without lifting the room floor", bestMoment: "quiet-guest" },
        { id: "echo", label: "Reduce echo or room sound", hint: "Tames hollow rooms while keeping tone natural", effect: "Hollow tail softens while speech stays natural", bestMoment: "noisy-room" },
        { id: "peaks", label: "Smooth harsh or sudden peaks", hint: "Protects listeners on laughs and emphasis", effect: "Sudden laughs stay energetic but less harsh", bestMoment: "peak" },
        { id: "clarity", label: "Improve overall speech clarity", hint: "Helps captions stay trustworthy", effect: "Speech edges sharpen for clearer captions", bestMoment: "caption-line" },
      ];

      const previewMoments = [
        { id: "quiet-guest", label: "Quiet guest answer", note: "Lift the guest without pulling room noise forward." },
        { id: "exchange", label: "Host and guest exchange", note: "Keep both speakers natural as the conversation moves." },
        { id: "noisy-room", label: "Noisy room stretch", note: "Reduce distraction without making the room feel artificial." },
        { id: "peak", label: "Laugh or peak moment", note: "Protect listeners on sudden emphasis." },
        { id: "caption-line", label: "Caption-sensitive line", note: "Keep speech clear enough for trusted captions." },
      ];

      const momentProfiles = {
        "quiet-guest": [18, 22, 26, 24, 20, 28, 32, 30, 24, 22],
        exchange: [34, 52, 38, 56, 42, 48, 36, 54, 40, 50],
        "noisy-room": [48, 52, 46, 50, 54, 49, 53, 47, 51, 55],
        peak: [30, 34, 78, 82, 36, 32, 74, 80, 34, 30],
        "caption-line": [26, 32, 38, 42, 36, 40, 34, 38, 32, 28],
      };

      const sampleSpeakers = [
        { id: "host", name: "Host — Dana Brooks", state: "not needed" },
        { id: "guest-1", name: "Guest 1 — Marcus Lee", state: "suggested" },
        { id: "guest-2", name: "Guest 2 — Priya Shah", state: "suggested" },
      ];

      let enabled = new Set(["balance", "quiet"]);
      let preview = "quiet-guest";
      let speakers = structuredClone(sampleSpeakers);
      let applied = false;
      let showReviewOnly = false;

      const controlsElement = document.querySelector("#controls");
      const momentsElement = document.querySelector("#moments");
      const compareElement = document.querySelector("#compare");
      const speakersElement = document.querySelector("#speakers");
      const rollupElement = document.querySelector("#cleanupRollup");
      const statusElement = document.querySelector("#status");
      const summaryElement = document.querySelector("#summary");
      const momentHintElement = document.querySelector("#moment-hint");
      const previewNowElement = document.querySelector("#preview-now");
      const previewTradeoffElement = document.querySelector("#preview-tradeoff");

      document.querySelector("#apply").addEventListener("click", () => {
        applied = true;
        speakers = speakers.map((speaker) => ({
          ...speaker,
          state: speaker.state === "suggested" ? "applied" : speaker.state,
        }));
        render();
      });

      function needsReviewState(state) {
        return state === "suggested";
      }

      function render() {
        const reviewCount = speakers.filter((speaker) => needsReviewState(speaker.state)).length;

        if (showReviewOnly && reviewCount === 0) {
          showReviewOnly = false;
        }

        controlsElement.replaceChildren(...choices.map(renderChoice));
        momentsElement.replaceChildren(...previewMoments.map(renderMoment));
        renderCompare();
        speakersElement.replaceChildren(
          ...speakers.map((speaker, index) => {
            const filteredOut = showReviewOnly && !needsReviewState(speaker.state);
            return renderSpeaker(speaker, index, filteredOut);
          }),
        );
        renderRollup(reviewCount);
        renderPreviewNow();
        renderPreviewTradeoff();
        renderMomentHint();

        statusElement.textContent = speakers.some((speaker) => speaker.state === "suggested")
          ? "Cleanup suggested"
          : "Sounds ready";
        summaryElement.textContent = buildSummary();
      }

      function bucketLabel(speaker) {
        return speaker.name.split(" — ")[0];
      }

      function rollupOpenSpeakerLinkLabel(speaker) {
        const bucket = bucketLabel(speaker);
        const active = choices.filter((entry) => enabled.has(entry.id));
        const primaryLabel = active[0]?.label?.toLowerCase();
        const momentLabel = previewMoments.find((entry) => entry.id === preview)?.label?.toLowerCase();

        let label = `Open ${bucket}`;
        if (primaryLabel) {
          label += active.length === 1 ? ` · ${primaryLabel}` : ` · ${primaryLabel} + ${active.length - 1} more`;
        }
        if (momentLabel) {
          label += ` · ${momentLabel} preview`;
        }
        return label;
      }

      function buildSummary() {
        const hasSuggested = speakers.some((speaker) => speaker.state === "suggested");
        if (hasSuggested) {
          return "Compare original and cleaned audio on a real moment, then apply cleanup across the episode.";
        }

        const appliedSpeakers = speakers.filter((speaker) => speaker.state === "applied");
        const keptOriginal = speakers.filter((speaker) => speaker.state === "accepted original");
        const parts = [];

        if (appliedSpeakers.length) {
          const previewLabel = previewMoments.find((moment) => moment.id === preview)?.label?.toLowerCase();
          const previewPhrase = previewLabel ? ` after previewing "${previewLabel}"` : "";
          parts.push(
            `Applied ${enabled.size} cleanup choice${enabled.size === 1 ? "" : "s"} to ${appliedSpeakers.map(bucketLabel).join(" and ")}${previewPhrase}.`,
          );
        }

        if (keptOriginal.length) {
          parts.push(`${keptOriginal.map(bucketLabel).join(" and ")} kept original audio on purpose.`);
        }

        if (parts.length) {
          return parts.join(" ");
        }

        return "Tracks are already clean enough for the final episode.";
      }

      function buildRollup() {
        const needsWork = speakers.filter((speaker) => speaker.state === "suggested");
        const clearCount = speakers.length - needsWork.length;

        if (needsWork.length) {
          return {
            statusClass: "attention",
            status: "Cleanup suggested",
            detail: `${needsWork.length} track${needsWork.length === 1 ? "" : "s"} need cleanup review · ${clearCount} already clear`,
            needsWork,
          };
        }

        return {
          statusClass: "all-clear",
          status: "Sounds ready",
          detail: `All ${speakers.length} speaker buckets are settled`,
          needsWork,
        };
      }

      function renderRollupSpeakerTags(needsWork) {
        const wrap = document.createElement("div");
        wrap.className = "rollup-speaker-tags";
        wrap.setAttribute("aria-label", "Speaker buckets needing cleanup review");

        for (const speaker of needsWork) {
          const tag = document.createElement("span");
          tag.className = "rollup-speaker-tag";
          tag.textContent = `${bucketLabel(speaker)} — review needed`;
          wrap.appendChild(tag);
        }

        return wrap;
      }

      function renderRollupChoiceTags() {
        const wrap = document.createElement("div");
        wrap.className = "rollup-choice-tags";
        wrap.setAttribute("aria-label", "Active cleanup choices in this review");

        for (const choice of choices.filter((entry) => enabled.has(entry.id))) {
          if (typeof choice.label !== "string" || !choice.label.length) continue;
          const tag = document.createElement("span");
          tag.className = "rollup-choice-tag";
          tag.textContent = choice.label;
          wrap.appendChild(tag);
        }

        return wrap;
      }

      function renderRollupMomentTags(needsWork) {
        const wrap = document.createElement("div");
        wrap.className = "rollup-moment-tags";
        wrap.setAttribute("aria-label", "Suggested preview moments for speaker buckets needing review");

        for (const speaker of needsWork) {
          const moment = rollupPreviewMomentForSpeaker(speaker);
          if (!moment?.label) continue;
          const tag = document.createElement("span");
          tag.className = "rollup-moment-tag";
          tag.textContent = `${bucketLabel(speaker)} — ${moment.label}`;
          wrap.appendChild(tag);
        }

        return wrap;
      }

      function rollupPreviewMomentForSpeaker(speaker) {
        const active = choices.filter((entry) => enabled.has(entry.id));
        if (!active.length) return null;

        const isGuest = speaker.id !== "host";
        let momentId = preview;

        if (isGuest && enabled.has("quiet")) {
          momentId = "quiet-guest";
        } else if (enabled.has("balance")) {
          momentId = "exchange";
        } else {
          momentId = active[0].bestMoment;
        }

        return (
          previewMoments.find((entry) => entry.id === momentId)
          || previewMoments.find((entry) => entry.id === preview)
        );
      }

      function renderRollupSpeakerEffectTags(needsWork) {
        const wrap = document.createElement("div");
        wrap.className = "rollup-effect-tags";
        wrap.setAttribute("aria-label", "Expected cleanup outcomes for speaker buckets needing review");

        const effects = choices
          .filter((entry) => enabled.has(entry.id))
          .map((entry) => entry.effect)
          .filter((effect) => typeof effect === "string" && effect.length);
        if (!effects.length) return wrap;

        for (const speaker of needsWork) {
          const tag = document.createElement("span");
          tag.className = "rollup-effect-tag";
          tag.textContent = `${bucketLabel(speaker)} — ${effects.join("; ")}`;
          wrap.appendChild(tag);
        }

        return wrap;
      }

      function renderRollup(reviewCount) {
        const rollup = buildRollup();
        rollupElement.className = `cleanup-rollup ${rollup.statusClass === "all-clear" ? "all-clear" : ""}`;
        rollupElement.replaceChildren();

        const head = document.createElement("div");
        head.className = "rollup-head";
        const status = document.createElement("span");
        status.className = `rollup-status ${rollup.statusClass}`;
        status.textContent = rollup.status;
        const detail = document.createElement("p");
        detail.className = "rollup-detail";
        detail.textContent = rollup.detail;
        head.append(status, detail);
        rollupElement.appendChild(head);

        if (rollup.needsWork.length) {
          rollupElement.appendChild(renderRollupSpeakerTags(rollup.needsWork));
          const choiceTags = renderRollupChoiceTags();
          if (choiceTags.childElementCount) {
            rollupElement.appendChild(choiceTags);
          }
          const momentTags = renderRollupMomentTags(rollup.needsWork);
          if (momentTags.childElementCount) {
            rollupElement.appendChild(momentTags);
          }
          const effectTags = renderRollupSpeakerEffectTags(rollup.needsWork);
          if (effectTags.childElementCount) {
            rollupElement.appendChild(effectTags);
          }
        }

        if (reviewCount > 0) {
          const toolbar = document.createElement("div");
          toolbar.className = "rollup-toolbar";
          const filterButton = document.createElement("button");
          filterButton.type = "button";
          filterButton.className = "secondary";
          filterButton.textContent = showReviewOnly
            ? `Show all ${speakers.length} speakers`
            : `Show speakers that need review (${reviewCount})`;
          filterButton.addEventListener("click", () => {
            showReviewOnly = !showReviewOnly;
            render();
          });
          toolbar.appendChild(filterButton);
          rollupElement.appendChild(toolbar);
        }

        if (rollup.needsWork.length) {
          const links = document.createElement("div");
          links.className = "rollup-links";
          for (const speaker of rollup.needsWork) {
            const jump = document.createElement("button");
            jump.type = "button";
            jump.className = "secondary";
            jump.textContent = rollupOpenSpeakerLinkLabel(speaker);
            jump.addEventListener("click", () => focusSpeaker(speaker.id));
            links.appendChild(jump);
          }
          rollupElement.appendChild(links);
        }
      }

      function focusSpeaker(speakerId) {
        showReviewOnly = false;
        render();
        const target = document.querySelector(`#speaker-${speakerId}`);
        if (!target) return;
        target.classList.add("jump-highlight");
        target.scrollIntoView({ behavior: "smooth", block: "nearest" });
        window.setTimeout(() => target.classList.remove("jump-highlight"), 1600);
      }

      function speakerBadgeClass(state) {
        if (state === "suggested") return "suggested";
        if (state === "applied") return "applied";
        if (state === "accepted original") return "original";
        return "not-needed";
      }

      function suggestedMoments() {
        return new Set(choices.filter((choice) => enabled.has(choice.id)).map((choice) => choice.bestMoment));
      }

      function renderPreviewNow() {
        const moment = previewMoments.find((entry) => entry.id === preview);
        previewNowElement.textContent = moment?.label ? `Previewing: ${moment.label}` : "";
      }

      function renderPreviewTradeoff() {
        const moment = previewMoments.find((entry) => entry.id === preview);
        previewTradeoffElement.textContent = enabled.size && moment?.note ? moment.note : "";
      }

      function renderMomentHint() {
        const active = choices.filter((choice) => enabled.has(choice.id));
        if (!active.length) {
          momentHintElement.textContent = "";
          return;
        }

        const labels = active.flatMap((choice) => {
          const moment = previewMoments.find((entry) => entry.id === choice.bestMoment);
          if (typeof choice.label !== "string" || !choice.label.length || !moment?.label) return [];
          return [`${choice.label.toLowerCase()} on ${moment.label.toLowerCase()}`];
        });

        momentHintElement.textContent = labels.length
          ? `Suggested previews highlighted for ${labels.join("; ")}.`
          : "";
      }

      function applyChoice(bars, choiceId, momentId) {
        switch (choiceId) {
          case "noise":
            if (momentId === "noisy-room") {
              return bars.map((height) => Math.round(height * 0.62 + 10));
            }
            return bars.map((height) => Math.max(16, height - 7));
          case "balance": {
            const average = bars.reduce((sum, height) => sum + height, 0) / bars.length;
            const strength = momentId === "exchange" ? 0.45 : 0.65;
            return bars.map((height) => Math.round(average + (height - average) * strength));
          }
          case "quiet":
            return bars.map((height) => (height < 34 ? Math.min(58, height + 16) : height));
          case "echo":
            return bars
              .map((height, index, list) => {
                const previous = list[index - 1] ?? height;
                const next = list[index + 1] ?? height;
                const blended = (previous + height + next) / 3;
                return Math.round(blended * 0.85 + height * 0.15);
              })
              .map((height, index) => (index % 2 === 1 ? Math.round(height * 0.82) : height));
          case "peaks":
            return bars.map((height) => (height > 62 ? Math.round(50 + (height - 62) * 0.28) : height));
          case "clarity":
            return bars.map((height) => {
              if (height >= 28 && height <= 46) {
                return Math.min(68, height + 12);
              }
              return Math.min(64, height + 4);
            });
          default:
            return bars;
        }
      }

      function buildCleanedPreview(original) {
        return choices.reduce(
          (bars, choice) => (enabled.has(choice.id) ? applyChoice(bars, choice.id, preview) : bars),
          [...original],
        );
      }

      function activeEffects() {
        return choices
          .filter((choice) => enabled.has(choice.id))
          .map((choice) => choice.effect)
          .filter((effect) => typeof effect === "string" && effect.length);
      }

      function waveMarkup(heights, cleaned) {
        const bars = Array.isArray(heights) ? heights : [];
        return bars
          .map((height) => `<i class="${cleaned ? "soft" : ""}" style="height:${height}%"></i>`)
          .join("");
      }

      function renderCompare() {
        const moment = previewMoments.find((entry) => entry.id === preview);
        const profileBars = momentProfiles[preview] ?? momentProfiles["quiet-guest"];
        const original = Array.isArray(profileBars) ? [...profileBars] : [];
        const cleaned = buildCleanedPreview(original);
        const effects = activeEffects();

        compareElement.replaceChildren(
          renderPreviewCard("Original", original, false, "What listeners hear now."),
          renderPreviewCard(
            "With cleanup",
            enabled.size ? cleaned : original,
            true,
            enabled.size ? "How cleanup changes this moment." : "Turn on a cleanup choice to preview the difference.",
            effects,
          ),
        );
      }

      function renderPreviewCard(title, heights, cleaned, note, effects = []) {
        const card = document.createElement("article");
        card.className = "preview-card";
        const heading = document.createElement("strong");
        heading.textContent = title;
        const wave = document.createElement("div");
        wave.className = `wave ${cleaned ? "cleaned" : ""}`;
        wave.innerHTML = waveMarkup(heights, cleaned);
        const copy = document.createElement("p");
        copy.className = "preview-note";
        copy.textContent = note;

        card.append(heading, wave, copy);

        if (effects.length) {
          const tags = document.createElement("div");
          tags.className = "effect-tags";
          tags.setAttribute("aria-label", "Active cleanup effects");
          for (const effect of effects) {
            if (typeof effect !== "string" || !effect.length) continue;
            const tag = document.createElement("span");
            tag.className = "effect-tag";
            tag.textContent = effect;
            tags.appendChild(tag);
          }
          card.appendChild(tags);
        }

        return card;
      }

      function renderChoice(choice) {
        const article = document.createElement("article");
        article.className = "control";
        const copy = document.createElement("div");
        const strong = document.createElement("strong");
        strong.textContent = choice.label;
        const span = document.createElement("span");
        span.textContent = choice.hint;
        copy.append(strong, span);

        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = enabled.has(choice.id);
        input.addEventListener("change", () => {
          if (input.checked) {
            enabled.add(choice.id);
            preview = choice.bestMoment;
          } else {
            enabled.delete(choice.id);
          }
          applied = false;
          render();
        });

        article.append(copy, input);
        return article;
      }

      function renderMoment(moment) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = moment.label;
        button.setAttribute("aria-pressed", moment.id === preview ? "true" : "false");
        if (suggestedMoments().has(moment.id)) {
          button.classList.add("suggested-moment");
        }
        button.addEventListener("click", () => {
          preview = moment.id;
          render();
        });
        return button;
      }

      function renderSpeaker(speaker, index, filteredOut = false) {
        const article = document.createElement("article");
        article.className = filteredOut ? "speaker filtered-out" : "speaker";
        article.id = `speaker-${speaker.id}`;
        const head = document.createElement("div");
        head.style.display = "flex";
        head.style.justifyContent = "space-between";
        head.style.gap = "10px";

        const strong = document.createElement("strong");
        strong.textContent = speaker.name;

        const badge = document.createElement("span");
        badge.className = `badge ${speakerBadgeClass(speaker.state)}`;
        badge.textContent = speaker.state;

        head.append(strong, badge);

        const label = document.createElement("label");
        label.textContent = "Track status";
        const select = document.createElement("select");
        for (const value of ["suggested", "applied", "accepted original", "not needed"]) {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          option.selected = speaker.state === value;
          select.appendChild(option);
        }
        select.addEventListener("change", () => {
          speaker.state = select.value;
          applied = false;
          render();
        });
        label.appendChild(select);
        article.append(head, label);

        if (speaker.state === "suggested" || speaker.state === "applied") {
          const actions = document.createElement("div");
          actions.className = "speaker-actions";

          if (speaker.state === "suggested") {
            const moment = rollupPreviewMomentForSpeaker(speaker);
            if (moment?.id && moment?.label) {
              const previewButton = document.createElement("button");
              previewButton.type = "button";
              previewButton.className = "secondary suggested-moment";
              previewButton.textContent = `Preview on ${moment.label.toLowerCase()}`;
              previewButton.addEventListener("click", () => {
                preview = moment.id;
                focusSpeaker(speaker.id);
              });
              actions.appendChild(previewButton);
            }
          }

          const revertButton = document.createElement("button");
          revertButton.type = "button";
          revertButton.className = "secondary";
          revertButton.textContent = "Revert to original";
          revertButton.addEventListener("click", () => {
            speakers[index].state = "accepted original";
            applied = false;
            render();
          });
          actions.appendChild(revertButton);
          article.appendChild(actions);
        }

        return article;
      }

      render();
    </script>
  </body>
</html>
