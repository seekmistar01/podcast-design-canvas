<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Destination Crop Preview Prototype</title>
    <style>
      :root {
        --ink: #17211f;
        --muted: #65716d;
        --line: #d8e0dd;
        --surface: #f7faf9;
        --accent: #116a5d;
        --warn: #a15f00;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 8px;
        font-size: 32px;
        line-height: 1.1;
      }

      .lede {
        color: var(--muted);
        max-width: 720px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 24px 0;
      }

      button {
        min-height: 38px;
        border: 1px solid #b9c6c2;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        padding: 7px 11px;
        cursor: pointer;
      }

      button[aria-pressed="true"] {
        border-color: var(--accent);
        background: #dcf2ee;
        color: var(--accent);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 24px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 18px;
      }

      .preview-wrap {
        display: grid;
        place-items: center;
        min-height: 460px;
      }

      .preview {
        position: relative;
        width: min(100%, 780px);
        overflow: hidden;
        border-radius: 8px;
        background: #0f1816;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
      }

      .preview.wide {
        aspect-ratio: 16 / 9;
      }

      .preview.mobile {
        width: min(72vw, 260px);
        aspect-ratio: 9 / 16;
      }

      .preview.square {
        width: min(72vw, 430px);
        aspect-ratio: 1;
      }

      .preview.thumbnail {
        aspect-ratio: 16 / 9;
      }

      .speaker {
        position: absolute;
        top: 18%;
        width: 28%;
        height: 54%;
        border: 3px solid rgba(255, 255, 255, 0.75);
        border-radius: 8px;
        background: linear-gradient(160deg, #6db5a8, #1d554d);
      }

      .speaker::before {
        content: "";
        position: absolute;
        top: 13%;
        left: 50%;
        width: 32%;
        aspect-ratio: 1;
        transform: translateX(-50%);
        border-radius: 50%;
        background: #e8f4f1;
      }

      .speaker::after {
        content: "";
        position: absolute;
        right: 18%;
        bottom: 16%;
        left: 18%;
        height: 34%;
        border-radius: 999px 999px 8px 8px;
        background: #d9ece8;
      }

      .host {
        left: 16%;
      }

      .guest {
        right: 16%;
      }

      .caption {
        position: absolute;
        right: 18%;
        bottom: 7%;
        left: 18%;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.92);
        color: #13211e;
        font-weight: 800;
        padding: 10px;
        text-align: center;
      }

      .logo {
        position: absolute;
        top: 6%;
        left: 6%;
        border-radius: 6px;
        background: #ffffff;
        color: var(--accent);
        font-weight: 900;
        padding: 8px 10px;
      }

      .title {
        position: absolute;
        top: 9%;
        right: 7%;
        max-width: 34%;
        color: #ffffff;
        font-size: 24px;
        font-weight: 900;
        line-height: 1.05;
        text-align: right;
      }

      .issues {
        display: grid;
        gap: 10px;
      }

      .issue {
        border-left: 4px solid var(--warn);
        border-radius: 6px;
        background: #ffffff;
        padding: 11px 12px;
      }

      .issue strong {
        display: block;
        margin-bottom: 4px;
      }

      .issue span {
        color: var(--muted);
      }

      .issue .fix-link {
        display: inline-block;
        margin-top: 8px;
        color: var(--accent);
        font-weight: 700;
        font-size: 13px;
        text-decoration: none;
      }

      .issue .fix-link:hover,
      .issue .fix-link:focus-visible {
        text-decoration: underline;
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      @media (max-width: 860px) {
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
      <script src="../preview/publish-nav.js" defer></script>
  </head>
  <body data-publish-step="destination-crop-preview">
    <main>
      <h1>Destination crop preview</h1>
      <p class="lede">Check whether speakers, captions, logos, and title text survive each publishing surface before export.</p>

      <div class="toolbar" id="toolbar"></div>

      <section class="workspace">
        <div class="panel preview-wrap">
          <div id="preview" class="preview wide" aria-label="Episode crop preview">
            <div class="logo">PDC</div>
            <div class="title">Building a reusable podcast style</div>
            <div class="speaker host" aria-label="Host frame"></div>
            <div class="speaker guest" aria-label="Guest frame"></div>
            <div class="caption">Guest explains the launch story with host reaction.</div>
          </div>
        </div>

        <aside class="panel">
          <h2>Crop checks</h2>
          <div id="issues" class="issues" aria-live="polite"></div>
        </aside>
      </section>
    </main>

    <script>
      const surfaces = {
        wide: "Wide episode",
        mobile: "Mobile crop",
        square: "Square preview",
        thumbnail: "Thumbnail",
      };

      const checks = {
        wide: [],
        mobile: [
          {
            title: "Guest frame is cropped",
            action: "Use a one-speaker focus crop or switch to stacked mobile layout.",
            fixScreen: "speaker-framing-safety.html",
            fixLabel: "speaker framing safety",
          },
          {
            title: "Caption competes with speaker frame",
            action: "Move captions higher for vertical export.",
            fixScreen: "layout-safe-areas.html",
            fixLabel: "layout safe areas",
          },
        ],
        square: [
          {
            title: "Logo is close to crop edge",
            action: "Use safer logo position for square previews.",
            fixScreen: "layout-safe-areas.html",
            fixLabel: "layout safe areas",
          },
        ],
        thumbnail: [
          {
            title: "Title may be small at thumbnail size",
            action: "Shorten title text or use a dedicated cover frame.",
            fixScreen: "thumbnail-cover-frame.html",
            fixLabel: "thumbnail cover frame",
          },
          {
            title: "Captions are not useful in thumbnail",
            action: "Hide captions for thumbnail export.",
            fixScreen: "layout-safe-areas.html",
            fixLabel: "layout safe areas",
          },
        ],
      };

      let selectedSurface = "wide";

      const toolbar = document.querySelector("#toolbar");
      const preview = document.querySelector("#preview");
      const issues = document.querySelector("#issues");

      function render() {
        toolbar.replaceChildren(
          ...Object.entries(surfaces).map(([id, label]) => {
            const button = document.createElement("button");
            button.type = "button";
            button.textContent = label;
            button.setAttribute("aria-pressed", String(id === selectedSurface));
            button.addEventListener("click", () => {
              selectedSurface = id;
              render();
            });
            return button;
          }),
        );

        preview.className = `preview ${selectedSurface}`;
        const currentChecks = checks[selectedSurface];
        issues.replaceChildren(
          ...(currentChecks.length
            ? currentChecks.map((issue) => renderIssue(issue))
            : [Object.assign(document.createElement("p"), { textContent: "No crop issues for this destination." })]),
        );
      }

      function renderIssue(issue) {
        const article = document.createElement("article");
        article.className = "issue";
        const strong = document.createElement("strong");
        strong.textContent = issue.title;
        const span = document.createElement("span");
        span.textContent = issue.action;
        article.append(strong, span);
        if (issue.fixScreen) {
          const openLink = document.createElement("a");
          openLink.className = "fix-link";
          openLink.href = issue.fixScreen;
          openLink.textContent = `Open ${issue.fixLabel} →`;
          article.append(openLink);
        }
        return article;
      }

      render();
    </script>
  </body>
</html>
